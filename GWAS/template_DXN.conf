cleanup = true

workDir = "/scratch/$USER/nf-gwas-work"
params {
     project                       = 'ToDOModelName' //Max 50 chars. No spaces allowed. Use only alphanumeric, underscores or dashes

     //options to set in case you want to use multi-models mode 
     models_table	           = null
     missing_tolerance         = 0.1

     //general input settings
     chromosomes                   = '1-22' //accept comma-separated list of chromosomes and ranges
     genotypes_build               = 'hg19' //hg19 or hg38

     //QCed genotypes for step1
     genotypes_array               = '/scratch/edoardo.giacopuzzi/UKBB/step1_dataset/step1_dataset_autosomes_QCed'
     
     //step 2 input - GWAS
     genotypes_imputed             = '/scratch/edoardo.giacopuzzi/UKBB/step2_dataset/step2_dataset_autosomes.mac100.bgen' 
     genotypes_imputed_format      = 'bgen'
     imputed_sample_file           = 'NO_SAMPLE_FILE' //Provide a specific sample file to use with gwas bgen input
     
     //step 2 input - rare variants
     genotypes_rarevar                     = null //genotype data for rare variants analysis. Can be bgen, pgen, plink bed or vcf.gz
     genotypes_rarevar_format              = null //input data format for rare variants. Can be bgen, pgen, bed or vcf
     rarevar_sample_file                   = 'NO_SAMPLE_FILE' //Provide a specific sample file to use with rare variants bgen input
     rarevar_set_list_file                 = null //set list file as defined in regenie docs
     rarevar_anno_file                     = null //variant annotation file as defined in regenie docs
     rarevar_mask_file                     = null //mask definition file as defined in regenie docs

     //LD panel files, used when clumping is active
     ld_panel                      = '/processing_data/shared_datasets/ukbiobank/GWAS_pipeline/LD_panel/chr{CHROM}_mac100_30000_random_unrelated_white_british' //use NO_LD_FILE when not available

     //phenotypes
     phenotypes_filename           = 'ToDOPath'
     phenotypes_columns            = 'Z0,Z1,Z2,Z3,Z4,Z5,Z6,Z7,Z8,Z9,Z10,Z11,Z12,Z13,Z14,Z15,Z16,Z17,Z18,Z19,Z20,Z21,Z22,Z23,Z24,Z25,Z26,Z27,Z28,Z29,Z30,Z31,Z32,Z33,Z34,Z35,Z36,Z37,Z38,Z39,Z40,Z41,Z42,Z43,Z44,Z45,Z46,Z47,Z48,Z49,Z50,Z51,Z52,Z53,Z54,Z55,Z56,Z57,Z58,Z59,Z60,Z61,Z62,Z63,Z64,Z65,Z66,Z67,Z68,Z69,Z70,Z71,Z72,Z73,Z74,Z75,Z76,Z77,Z78,Z79,Z80,Z81,Z82,Z83,Z84,Z85,Z86,Z87,Z88,Z89,Z90,Z91,Z92,Z93,Z94,Z95,Z96,Z97,Z98,Z99,Z100,Z101,Z102,Z103,Z104,Z105,Z106,Z107,Z108,Z109,Z110,Z111,Z112,Z113,Z114,Z115,Z116,Z117,Z118,Z119,Z120,Z121,Z122,Z123,Z124,Z125,Z126,Z127'
     phenotypes_binary_trait       = false

     //covariates
     covariates_filename           = '/group/glastonbury/emanuele/GWAS/yearcatcovar/Inferred_abdominal_V2_yearcatcovar/covariatesV1.tsv'
     covariates_columns            = 'BIN_Gender,age_at_imaging,age_squared,date,genotype,centre'
     covariates_cat_columns        = 'BIN_Gender,genotype,centre,date'
     maxCatLevels                  = 10

     //step1 settings
     step1_n_chunks                = 100
     save_step1_predictions        = true

     //step2 settings - GWAS
     regenie_gwas_test             = 'additive' //or dominant or recessive
     step2_gwas_split              = true
     step2_gwas_chunk_size         = 200000
     regenie_gwas_min_mac          = 100
     regenie_min_imputation_score  = 0.00

     //step2 settings - rare variants
     step2_rarevar_split           = true
     step2_rarevar_chunk_size      = 200
     regenie_rarevar_min_mac       = 1 
     rarevars_aaf_bins             = '0.01,0.05' //comma-separated list of AAF upper bounds to use in burden test
     rarevars_vc_test              = 'skat,skato,acatv,acato'
     rarevars_vc_maxAAF            =  0.05 //AAF upper bound to use for SKAT/ACAT-type tests
     
     //post-process settings
     annotation_min_log10p         = 7.3
     clumping                      = true
     clump_p1                      = 5e-8

     rarevar_min_log10p            = 5 //results with -log10(p) above this will be selected as tophits and annotated in the general manhattan plot
     rarevar_stat_test_threshold   = 1.3 //results with -log10(rarevar_stat_test) above this will be annotated in a specific manhattan plot
     rarevar_stat_test             = "FDR_bygroup" //Corrected P value to use for the second manhattan plot. Possible values: "FDR_bygroup", "FDR_alltests", "BONF_bygroup", "BONF_alltests"

     //activate HTML reports (often it is better to turn this off when testing a large number of traits)
     make_report                   = false
}

